services:
  postgres:
    image: docker.io/library/postgres:18.3
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=nextjs-course
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
